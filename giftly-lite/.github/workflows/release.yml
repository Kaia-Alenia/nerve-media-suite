name: Build Giftly Lite

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka ordered-set zstandard

      - name: Build executable with Nuitka
        run: |
          python -m nuitka --onefile --assume-yes-for-downloads --windows-console-mode=disable --include-data-dir=src=src --include-data-dir=assets=assets --windows-icon-from-ico=assets/app_icon.ico --output-filename=GiftlyLite.exe src/main.py

      - name: Package build
        run: |
          powershell Compress-Archive -Path GiftlyLite.exe, LICENSE -DestinationPath GiftlyLite-Windows.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GiftlyLite-Windows
          path: GiftlyLite-Windows.zip

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka ordered-set zstandard imageio

      - name: Build executable with Nuitka
        run: |
          python -m nuitka --mode=app --include-data-dir=src=src --include-data-dir=assets=assets --macos-app-icon=assets/app_icon.ico --output-filename=GiftlyLite src/main.py

      - name: Package build
        run: |
          mv main.app GiftlyLite.app
          mkdir -p GiftlyLite.app/Contents/Resources
          cp LICENSE GiftlyLite.app/Contents/Resources/
          zip -r GiftlyLite-macOS.zip GiftlyLite.app

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GiftlyLite-macOS
          path: GiftlyLite-macOS.zip

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y python3-pip python3-gi python3-gi-cairo gir1.2-gtk-3.0 gir1.2-webkit2-4.1
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip install -r requirements.txt nuitka ordered-set zstandard --break-system-packages

      - name: Build executable with Nuitka
        run: |
          python3 -m nuitka --onefile --include-package=gi --include-data-dir=src=src --include-data-dir=assets=src/assets --output-filename=GiftlyLite.bin src/main.py

      - name: Package build
        run: |
          tar -czf GiftlyLite-Linux.tar.gz GiftlyLite.bin LICENSE

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GiftlyLite-Linux
          path: GiftlyLite-Linux.tar.gz

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/GiftlyLite-Windows/GiftlyLite-Windows.zip
            artifacts/GiftlyLite-macOS/GiftlyLite-macOS.zip
            artifacts/GiftlyLite-Linux/GiftlyLite-Linux.tar.gz
